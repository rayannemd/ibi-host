spring.application.name=firstwebapp

# Porta do servidor. Render injeta a porta via variável PORT; localmente usa 8080.
server.port=${PORT:8080}

# Origens liberadas no CORS (lista separada por vírgula). Ex.: https://seu-front.netlify.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Segredo de assinatura do JWT (obrigatório, via env JWT_SECRET; mín. 32 caracteres).
jwt.secret=${JWT_SECRET}
# Expiração do token em milissegundos (default: 1 hora).
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true